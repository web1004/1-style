<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>24-이미지효과활용하기</title>
  <style>
    /* 01 */
    .logo-bg{
      width: 500px;
      height: 460px;
      background: url(image/coffee.jpg) no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      background-blend-mode: hard-light;
    }
    .logo-bg img{mix-blend-mode: multiply;}
    /* 요소의 컨텐츠가 해당요소의 부모 콘텐츠 및 요소의 배경와 어떻게 혼합되는지
    mix-blend-mode: normal;
    mix-blend-mode: multiply;
    mix-blend-mode: hard-light;
    */

    /* 02 */
    .heading{
      font-size: 75px;
      text-align: center;
      font-weight: bold;
      text-transform: uppercase;
      background-image: linear-gradient(to right, #fa709a 0%, #fee140 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
    }
    /* 신규속성으로 브라우저에 적용이 안되므로 접두사를  붙여야 함 
      -webkit- : 크롬,사파리 브라우저 접두사
      -moz- : 파이어폭스
    */
    .backgroundclip{
      font-size: 170px;
      font-weight: 700;
      text-transform: uppercase; 
      text-align: center;
      background-image: url(image/crop.jpg);
      background-repeat: no-repeat;
      background-position: center;
      background-size: 120% cover;
      -webkit-background-clip: text;  /* 엣지에도 적용 */
      background-clip: text;  /* background-clip->대상을 텍스트로 지정한다 */ 
      color: rgba(0,0,0,0);
    }

    /* 03 클리핑마스크 속성 */
    .img_mask{
      width: 777px;
      height: 777px;
      -webkit-mask-image:url(image/mask.png);  /* 엣지에는 적용되지 않음 */
      mask-image:url(image/mask.png); /* 마스크모양으로 사용할 이미지 */
    }

    /* 04 */
    .bg-blend{
      width: 400px;
      height: 400px;
      background: url("image/blush.png") pink;
      background-blend-mode: screen;
    }
    .container {
      margin-top: 50px;
      width: 500px;
      height: 400px;
      background-image:linear-gradient(rgb(219, 166, 166), rgb(0, 0, 172));
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      }
    .container .box{
      width: 300px;
      height: 200px;      
      background-color: rgba(255, 255, 255, 0.3);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);  /* 기존의 filter속성과 비슷한 기능이지만 아직은 적용안됨 */
    }
  </style>
</head>
<body>
  
  <h1>01.mix-blend-mode, background-blend-mode : 혼합모드 적용하는 속성</h1>
  <div class="logo-bg">
    <img src="image/coffee-logo-white.png" alt="">
    <!--<img src="image/coffee-logo-color.png" alt="">  ->배경색이 있는 경우는 투과되지않음-->
  </div>
  <hr>

  <h1>02.글자 모양 안에 그래디언트와 그림넣기</h1>
  <div class="heading">World Best Cities</div>
  <div class="backgroundclip">coffee</div>
  <hr>

  <h1>03.이미지에 마스크효과주기(클리핑마스크)</h1>
  <div class="img_mask">
    <img src="image/img.jpg" alt="" > <!-- 마스크모양에 삽입할 이미지 -->
  </div>
  <hr>

  <h1>04.backdrop-filter 속성</h1>
  <div class="bg-blend"></div>

  <div class="container">
  <div class="box">
    <p>backdrop-filter: blur(10px)</p>
  </div>
</div>

</body>
</html>
